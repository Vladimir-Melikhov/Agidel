<style>
    .site-footer {
        background: var(--dark);
        padding: 48px 40px 32px;
        text-align: center;
    }
    .site-footer .footer-duck {
        width: 48px;
        margin-bottom: 12px;
        opacity: 0.7;
    }
    .site-footer h3 {
        font-family: 'Nunito', sans-serif;
        font-weight: 900;
        font-size: 1.1rem;
        color: var(--white);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 20px;
    }
    .footer-contacts {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
    }
    .footer-contact {
        color: var(--blue);
        font-size: 0.95rem;
        font-weight: 600;
        text-decoration: none;
        opacity: 0.85;
        line-height: 1.5;
        transition: opacity 0.2s;
    }
    .footer-contact:hover { opacity: 1; }
    .footer-copy {
        color: var(--blue);
        font-size: 0.8rem;
        font-weight: 600;
        opacity: 0.4;
    }

    /* FLASH СООБЩЕНИЯ */
    .messages-wrap {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 200;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .message {
        padding: 14px 20px;
        border-radius: 16px;
        font-family: 'Nunito', sans-serif;
        font-weight: 800;
        font-size: 0.9rem;
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        animation: slideIn 0.3s ease;
    }
    .message.error   { background: #FF5252; color: #fff; }
    .message.success { background: var(--dark); color: #fff; }
    .message.warning { background: var(--orange); color: #fff; }

    @keyframes slideIn {
        from { transform: translateX(80px); opacity: 0; }
        to   { transform: translateX(0);    opacity: 1; }
    }
</style>

{% if messages %}
<div class="messages-wrap">
    {% for message in messages %}
    <div class="message {{ message.tags }}">{{ message }}</div>
    {% endfor %}
</div>
{% endif %}

<footer class="site-footer">
    <img src="/static/img/utka.png" alt="" class="footer-duck">
    <h3>Центр детского здоровья «Агидель»</h3>

    <div class="footer-contacts">
        <a href="tel:+79067756677" class="footer-contact">+7 906 775 66 77</a>
        <a href="mailto:agidel_2018@mail.ru" class="footer-contact">agidel_2018@mail.ru</a>
        <span class="footer-contact">Московская область, г. Реутов,<br>Юбилейный пр., д. 59, пом. 5</span>
    </div>

</footer>
