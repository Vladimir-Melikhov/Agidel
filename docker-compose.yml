services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - my_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    restart: unless-stopped
    volumes:
      - static_files:/app/static
      - media_files:/app/media
    depends_on:
      - db

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - static_files:/srv/static
      - media_files:/srv/media
    depends_on:
      - web

volumes:
  my_data:
  static_files:
  media_files: